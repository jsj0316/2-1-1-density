<script type="text/babel">
const{useState,useEffect,useRef,useCallback,createContext,useContext}=React;

/* ===== SOUND ENGINE ===== */
const SFX={
    _ctx:null,
    _getCtx(){if(!this._ctx)this._ctx=new(window.AudioContext||window.webkitAudioContext)();return this._ctx},
    play(type){
        try{
            const c=this._getCtx();
            if(c.state==='suspended')c.resume();
            const now=c.currentTime;
            switch(type){
                case'click':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(880,now);g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.1);o.start(now);o.stop(now+.1);break}
                case'place':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.setValueAtTime(440,now);o.frequency.exponentialRampToValueAtTime(220,now+.2);g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.001,now+.25);o.start(now);o.stop(now+.25);break}
                case'splash':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(100,now+.4);g.gain.setValueAtTime(.06,now);g.gain.exponentialRampToValueAtTime(.001,now+.4);o.start(now);o.stop(now+.4);break}
                case'success':{[523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(f,now+i*.12);g.gain.setValueAtTime(.12,now+i*.12);g.gain.exponentialRampToValueAtTime(.001,now+i*.12+.3);o.start(now+i*.12);o.stop(now+i*.12+.3)});break}
                case'error':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.setValueAtTime(180,now);g.gain.setValueAtTime(.06,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);o.start(now);o.stop(now+.3);break}
                case'achievement':{[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(f,now+i*.15);g.gain.setValueAtTime(.15,now+i*.15);g.gain.exponentialRampToValueAtTime(.001,now+i*.15+.4);o.start(now+i*.15);o.stop(now+i*.15+.4)});break}
                case'fanfare':{const notes=[523,659,784,659,784,1047];notes.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(f,now+i*.18);g.gain.setValueAtTime(.15,now+i*.18);g.gain.exponentialRampToValueAtTime(.001,now+i*.18+.35);o.start(now+i*.18);o.stop(now+i*.18+.35)});break}
                case'reset':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(300,now+.15);g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);o.start(now);o.stop(now+.15);break}
                case'dive':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(800,now);o.frequency.exponentialRampToValueAtTime(200,now+.6);g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.001,now+.6);o.start(now);o.stop(now+.6);break}
            }
        }catch(e){}
    }
};

                    <p className="text-xs text-gray-500">버전: 3.0 | 최종 수정: 2026-03-09</p>

/* ===== ACHIEVEMENT BAR ===== */
const AchievementBar=({achievements,onShowCert})=>{
    const total=Object.values(achievements).filter(Boolean).length;
    return(
        <div className="flex items-center gap-2">
            {[{key:'explore',icon:'🔬',label:'탐구'},{key:'tower',icon:'🧪',label:'해보기'},{key:'diver',icon:'🤿',label:'잠수'}].map(a=>(
                <div key={a.key} className={`flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-bold border ${achievements[a.key]?'bg-yellow-100 border-yellow-400 text-yellow-800':'bg-slate-600 border-slate-500 text-slate-400'}`} title={a.label}>

                    {achievements[a.key]&&<span>✓</span>}

        </div>

};

/* ===== TAB 1: EXPLORE ===== */
const ExperimentLab=({onAchieve})=>{
    const[selectedObj,setSelectedObj]=useState(null);
    const[scaleValue,setScaleValue]=useState(0);
    const[onScale,setOnScale]=useState(null);
    const[inCylinder,setInCylinder]=useState(null);
    const[temperature,setTemperature]=useState(20);
    const baseWaterVolume=50.0;

    // Track which materials have been fully measured
    const[completed,setCompleted]=useState({});// {id: {mass:true,volume:true}}
    const[userInputs,setUserInputs]=useState({});// {id: {mass:'',volume:''}}
    const[inputErrors,setInputErrors]=useState({});
    const[guideStep,setGuideStep]=useState(0);

    // Mystery quiz
    const[quizA,setQuizA]=useState('');
    const[quizB,setQuizB]=useState('');
    const[quizResult,setQuizResult]=useState(null);
    const[showConclusion,setShowConclusion]=useState(false);

    const currentWaterVolume=baseWaterVolume+(baseWaterVolume*0.0004*(temperature-20));
    const totalVolume=currentWaterVolume+(inCylinder?inCylinder.volume:0);

    // Which material index is currently unlocked
    const getUnlockedIndex=()=>{
        for(let i=0;i<MAT_ORDER.length;i++){
            const c=completed[MAT_ORDER[i]];
            if(!c||!c.mass||!c.volume) return i;
        }
        return MAT_ORDER.length;
    };
    const unlockedIdx=getUnlockedIndex();

    const isUnlocked=(matId)=>{
        const idx=MAT_ORDER.indexOf(matId);
        return idx<=unlockedIdx;
    };

    const handleSelect=(obj)=>{
        if(inCylinder||onScale)return;
        if(!isUnlocked(obj.id))return;
        SFX.play('click');
        setSelectedObj(obj);
        if(guideStep===0)setGuideStep(1);
    };

    const placeOnScale=()=>{
        if(!selectedObj)return;
        SFX.play('place');
        const m=selectedObj;
        setOnScale(m);
        setSelectedObj(null);
        setTimeout(()=>setScaleValue(m.mass.toFixed(2)),400);
        setCompleted(p=>({...p,[m.id]:{...p[m.id],mass:true}}));
        if(guideStep<2)setGuideStep(2);
    };

    const placeInCylinder=()=>{
        if(!selectedObj)return;
        SFX.play('splash');
        const m=selectedObj;
        setInCylinder(m);
        setSelectedObj(null);
        setCompleted(p=>({...p,[m.id]:{...p[m.id],volume:true}}));
        if(guideStep<3)setGuideStep(3);
    };

    const resetExperiment=()=>{
        SFX.play('reset');
        setOnScale(null);setInCylinder(null);setSelectedObj(null);setScaleValue(0);
    };

    // User manual input
    const handleInput=(matId,field,val)=>{
        setUserInputs(p=>({...p,[matId]:{...p[matId],[field]:val}}));
        setInputErrors(p=>{const n={...p};delete n[`${matId}_${field}`];return n});
    };

    const validateInput=(matId,field)=>{
        const mat=MATERIALS.find(m=>m.id===matId);
        const val=parseFloat(userInputs[matId]?.[field]||'');
        const actual=field==='mass'?mat.mass:mat.volume;
        if(isNaN(val)){setInputErrors(p=>({...p,[`${matId}_${field}`]:'숫자를 입력하세요'}));return false}
        if(Math.abs(val-actual)>0.5){setInputErrors(p=>({...p,[`${matId}_${field}`]:'측정값을 다시 확인하세요'}));SFX.play('error');return false}
        SFX.play('success');
        return true;
    };

    const getUserDensity=(matId)=>{
        const inp=userInputs[matId];
        if(!inp?.mass||!inp?.volume)return null;
        const m=parseFloat(inp.mass),v=parseFloat(inp.volume);
        if(isNaN(m)||isNaN(v)||v===0)return null;
        return(m/v).toFixed(2);
    };

    // Check all 4 base materials entered correctly
    const allBaseComplete=['iron_s','iron_l','alu_s','alu_l'].every(id=>{
        const d=getUserDensity(id);
        return d!==null;
    });

    // Check mystery materials entered
    const mysteryComplete=['mystery_a','mystery_b'].every(id=>getUserDensity(id)!==null);

    const handleQuizSubmit=()=>{
        if(quizA==='금'&&quizB==='구리'){
            SFX.play('achievement');
            setQuizResult('correct');
            onAchieve('explore');
        }else{
            SFX.play('error');
            setQuizResult('wrong');
        }
    };

    const guideMessages=[
        {title:"시작하기",text:"아래 '실험 재료'에서 첫 번째 물질(철 조각 소)을 클릭하세요.",icon:"👆"},
        {title:"측정 도구 선택",text:"저울에 '올리기'로 질량을, 눈금 실린더에 '넣기'로 부피를 측정하세요.",icon:"⚖️"},
        {title:"질량 측정 완료!",text:"저울의 숫자를 읽고 측정 결과표에 직접 입력하세요. '실험 도구 비우기' 후 부피도 측정하세요.",icon:"✏️"},
        {title:"부피 측정 완료!",text:"눈금 실린더의 눈금을 읽고 부피 변화량을 결과표에 입력하세요. (물질의 부피 = 넣은 후 - 넣기 전)",icon:"📐"},
    ];
    const guide=guideMessages[Math.min(guideStep,3)];

    return(
        <div className="flex flex-col lg:flex-row h-full gap-3 p-3">
            {/* Left: Lab */}
            <div className="flex-1 bg-white rounded-2xl shadow-lg p-5 flex flex-col relative overflow-hidden">
                <div className="flex flex-wrap justify-between items-center mb-4 gap-2">
                    <h2 className="text-base font-bold text-gray-800 flex items-center gap-2">
                        <FlaskConical className="text-blue-600" size={20}/>
                        탐구: 질량과 부피를 측정하여 밀도 구하기
                    </h2>
                    <div className="bg-orange-50 p-1.5 rounded-lg border border-orange-200 flex items-center gap-2">
                        <Thermometer className="text-orange-500" size={16}/>
                        <div className="flex flex-col">
                            <span className="text-[10px] text-orange-800 font-bold">물의 온도: {temperature}°C</span>
                            <input type="range" min="0" max="80" value={temperature} onChange={e=>setTemperature(parseInt(e.target.value))} className="w-24 h-1.5 bg-orange-200 rounded-lg appearance-none cursor-pointer"/>
                        </div>
                    </div>
                </div>

                {/* Guide */}
                <div className="bg-blue-50 border border-blue-200 rounded-xl p-2.5 mb-3 fade-in" key={guideStep}>
                    <div className="flex items-start gap-2">
                        <span className="text-xl">{guide.icon}</span>
                        <div><h4 className="font-bold text-blue-800 text-xs">{guide.title}</h4><p className="text-blue-700 text-[11px] leading-relaxed">{guide.text}</p></div>
                    </div>
                </div>

                {/* Cylinder reading tip */}
                <div className="bg-amber-50 border border-amber-200 rounded-lg p-2 mb-3 text-[10px] text-amber-800 flex items-start gap-2">
                    <span className="text-base">⚠️</span>
                    <div>
                        <strong>눈금 실린더 읽는 법:</strong> 눈을 액체 표면과 같은 높이에 놓고, <strong>오목한 면(메니스커스)의 가장 낮은 부분</strong>을 읽습니다. 물질을 넣기 전 눈금(50.00mL)과 넣은 후 눈금의 차이가 물질의 부피입니다.
                    </div>
                </div>

                {/* Instruments */}
                <div className="flex-1 flex flex-row justify-around items-end gap-6 pb-2">
                    {/* Scale */}
                    <div className="flex flex-col items-center relative z-10 w-44">
                        <div className="w-full h-7 bg-gray-400 rounded-lg shadow-md mt-auto"></div>
                        <div className={`w-36 h-3.5 bg-gray-300 rounded-t-lg mx-auto relative -mt-10 mb-2 scale-plate ${onScale?'translate-y-0.5':''}`}>
                            {onScale&&<div className="absolute bottom-full left-1/2 transform -translate-x-1/2 shadow-lg mb-0 border border-gray-500" style={{backgroundColor:onScale.color,width:onScale.size==='large'?'44px':'28px',height:onScale.size==='large'?'44px':'28px',borderRadius:'4px'}}></div>}
                        </div>
                        <div className="bg-gray-800 text-green-400 font-mono text-xl px-3 py-1.5 rounded-lg border-4 border-gray-300 shadow-inner w-full text-center mt-3">{scaleValue}<span className="text-xs ml-1">g</span></div>
                        <span className="text-gray-500 text-xs mt-1.5 font-medium">전자 저울</span>
                        {selectedObj&&!onScale&&!inCylinder&&<button onClick={placeOnScale} className="absolute -top-8 left-1/2 transform -translate-x-1/2 bg-blue-500 text-white px-3 py-1 rounded-lg shadow-lg text-xs animate-pulse whitespace-nowrap font-medium">⬇ 올리기</button>}
                    </div>
                    {/* Cylinder */}
                    <div className="flex flex-col items-center relative w-28">
                        <div className="relative w-20 h-56 border-l-2 border-r-2 border-b-4 border-gray-400 rounded-b-xl bg-white bg-opacity-50 overflow-hidden cylinder-gradient">
                            {[...Array(10)].map((_,i)=><div key={i} className="absolute w-full border-t border-gray-300" style={{bottom:`${(i+1)*10}%`}}><span className="absolute right-0.5 -top-2.5 text-[9px] text-gray-400">{(i+1)*10}</span></div>)}
                            <div className="absolute bottom-0 w-full bg-blue-400 bg-opacity-60 water-surface" style={{height:`${(totalVolume/100)*100}%`}}></div>
                            {inCylinder&&<div className="absolute left-1/2 transform -translate-x-1/2 shadow-lg border border-gray-600" style={{bottom:'2%',backgroundColor:inCylinder.color,width:inCylinder.size==='large'?'28px':'18px',height:inCylinder.size==='large'?'28px':'18px',borderRadius:'3px',transition:'bottom 1s ease-out'}}></div>}
                        </div>
                        <div className="mt-1.5 text-center">
                            <div className="font-bold text-blue-800 text-sm">{totalVolume.toFixed(2)} mL</div>
                            {inCylinder&&<div className="text-[10px] text-gray-500">물질 부피: {(totalVolume-currentWaterVolume).toFixed(2)} mL</div>}
                            <span className="text-gray-500 text-xs font-medium">눈금 실린더</span>
                        </div>
                        {selectedObj&&!onScale&&!inCylinder&&<button onClick={placeInCylinder} className="absolute top-1/2 -right-12 bg-blue-500 text-white px-2.5 py-1 rounded-lg shadow-lg text-xs animate-pulse whitespace-nowrap font-medium">⬇ 넣기</button>}
                    </div>
                </div>

                {(onScale||inCylinder)&&<button onClick={resetExperiment} className="mt-2 w-full bg-red-50 text-red-600 py-1.5 rounded-lg hover:bg-red-100 font-medium flex items-center justify-center gap-2 border border-red-200 text-sm"><RefreshCcw size={14}/> 실험 도구 비우기</button>}
            </div>

            {/* Right panel */}
            <div className="lg:w-[420px] flex flex-col gap-3 overflow-y-auto" style={{maxHeight:'100%'}}>
                {/* Materials */}
                <div className="bg-white p-3 rounded-xl shadow-lg">
                    <h3 className="font-bold text-gray-800 mb-2 border-b pb-1.5 text-sm">실험 재료 (순서대로 측정하세요)</h3>
                    <div className="grid grid-cols-3 gap-1.5">
                        {MATERIALS.map((mat,idx)=>{
                            const unlocked=isUnlocked(mat.id);
                            const c=completed[mat.id];
                            const done=c?.mass&&c?.volume;
                            return(
                                <div key={mat.id} onClick={()=>unlocked&&handleSelect(mat)} className={`relative flex flex-col items-center p-1.5 rounded-lg border transition-all ${!unlocked?'opacity-40 cursor-not-allowed bg-gray-100':'cursor-pointer hover:scale-105'} ${selectedObj?.id===mat.id?'bg-blue-100 border-blue-500 ring-2 ring-blue-300':done?'bg-green-50 border-green-300':'bg-gray-50 border-gray-200'}`}>
                                    {!unlocked&&<div className="locked-overlay"><span className="text-lg">🔒</span></div>}
                                    <div className="rounded border border-gray-400 mb-0.5" style={{backgroundColor:mat.color,width:mat.size==='large'?'32px':'20px',height:mat.size==='large'?'32px':'20px'}}></div>
                                    <span className="text-[9px] font-medium text-center leading-tight">{mat.name}</span>
                                    <div className="flex gap-0.5 mt-0.5">
                                        {c?.mass&&<span className="text-[8px] bg-green-100 text-green-700 px-0.5 rounded">질량✓</span>}
                                        {c?.volume&&<span className="text-[8px] bg-blue-100 text-blue-700 px-0.5 rounded">부피✓</span>}
                                    </div>
                                    {done&&<span className="absolute top-0.5 right-0.5 text-[10px]">✅</span>}
                                </div>
                            );
                        })}
                    </div>
                    <div className="flex items-center gap-1 mt-2 text-[9px] text-gray-400">
                        <span>🔒 이전 물질을 모두 측정하면 다음 물질이 잠금 해제됩니다</span>
                    </div>
                </div>

                {/* Manual Input Table */}
                <div className="bg-white p-3 rounded-xl shadow-lg">
                    <h3 className="font-bold text-gray-800 mb-2 border-b pb-1.5 text-sm">📝 측정 결과표 (직접 입력)</h3>
                    <div className="overflow-x-auto">
                        <table className="w-full text-[11px] border-collapse">
                            <thead><tr className="bg-gray-100 text-gray-600">
                                <th className="py-1 px-1.5 text-left rounded-tl-lg">물질</th>
                                <th className="py-1 px-1.5 text-center">질량(g)</th>
                                <th className="py-1 px-1.5 text-center">부피(cm³)</th>
                                <th className="py-1 px-1.5 text-center rounded-tr-lg">밀도(g/cm³)</th>
                            </tr></thead>
                            <tbody>
                                {MATERIALS.map(mat=>{
                                    const c=completed[mat.id];
                                    const unlocked=c?.mass||c?.volume;
                                    const d=getUserDensity(mat.id);
                                    if(!unlocked)return null;
                                    return(
                                        <tr key={mat.id} className="border-t border-gray-100">
                                            <td className="py-1 px-1.5 flex items-center gap-1">
                                                <div className="w-2.5 h-2.5 rounded" style={{backgroundColor:mat.color}}></div>
                                                <span className="text-[10px]">{mat.name}</span>
                                            </td>
                                            <td className="py-1 px-1">
                                                {c?.mass?<div>
                                                    <input type="number" step="0.01" value={userInputs[mat.id]?.mass||''} onChange={e=>handleInput(mat.id,'mass',e.target.value)} onBlur={()=>userInputs[mat.id]?.mass&&validateInput(mat.id,'mass')} className={`w-16 text-center border rounded px-1 py-0.5 text-[11px] font-mono ${inputErrors[`${mat.id}_mass`]?'border-red-400 bg-red-50':'border-gray-300'}`} placeholder="?"/>
                                                    {inputErrors[`${mat.id}_mass`]&&<div className="text-[8px] text-red-500 mt-0.5">{inputErrors[`${mat.id}_mass`]}</div>}
                                                </div>:<span className="text-gray-300 text-[10px]">측정 필요</span>}
                                            </td>
                                            <td className="py-1 px-1">
                                                {c?.volume?<div>
                                                    <input type="number" step="0.1" value={userInputs[mat.id]?.volume||''} onChange={e=>handleInput(mat.id,'volume',e.target.value)} onBlur={()=>userInputs[mat.id]?.volume&&validateInput(mat.id,'volume')} className={`w-16 text-center border rounded px-1 py-0.5 text-[11px] font-mono ${inputErrors[`${mat.id}_volume`]?'border-red-400 bg-red-50':'border-gray-300'}`} placeholder="?"/>
                                                    {inputErrors[`${mat.id}_volume`]&&<div className="text-[8px] text-red-500 mt-0.5">{inputErrors[`${mat.id}_volume`]}</div>}
                                                </div>:<span className="text-gray-300 text-[10px]">측정 필요</span>}
                                            </td>
                                            <td className="py-1 px-1.5 text-center">
                                                {d?<span className="font-mono font-bold text-blue-600">{d}</span>:<span className="text-gray-300">-</span>}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    {/* Conclusion: same material = same density */}
                    {allBaseComplete&&!showConclusion&&<button onClick={()=>{setShowConclusion(true);SFX.play('success')}} className="mt-2 w-full bg-green-600 text-white py-1.5 rounded-lg text-xs font-bold hover:bg-green-700">📊 결과 분석하기</button>}
                    {showConclusion&&(
                        <div className="mt-2 bg-green-50 border border-green-200 rounded-lg p-2.5 fade-in">
                            <h4 className="font-bold text-green-800 text-xs mb-1.5">✅ 결론: 밀도는 물질의 특성</h4>
                            <div className="text-[10px] text-green-900 space-y-1">
                                <p>• 철 (소): <strong>{getUserDensity('iron_s')||'?'}</strong> g/cm³ | 철 (대): <strong>{getUserDensity('iron_l')||'?'}</strong> g/cm³ → <strong>같다!</strong></p>
                                <p>• 알루미늄 (소): <strong>{getUserDensity('alu_s')||'?'}</strong> g/cm³ | 알루미늄 (대): <strong>{getUserDensity('alu_l')||'?'}</strong> g/cm³ → <strong>같다!</strong></p>
                                <p className="bg-green-100 p-1.5 rounded font-bold text-green-800">→ 같은 물질은 양(크기)이 달라도 밀도가 같다!<br/>→ 따라서 <span className="underline">밀도는 물질의 특성</span>이다.</p>
                            </div>
                        </div>
                    )}

                    {/* Mystery Quiz */}
                    {mysteryComplete&&(
                        <div className="mt-2 bg-amber-50 border border-amber-200 rounded-lg p-2.5 fade-in">
                            <h4 className="font-bold text-amber-800 text-xs mb-2">🔍 미지의 물질 감별 퀴즈</h4>
                            <div className="space-y-2">
                                <div>
                                    <p className="text-[10px] text-amber-700 mb-1">미지의 물질 A (밀도: {getUserDensity('mystery_a')} g/cm³)의 정체는?</p>
                                    <div className="flex flex-wrap gap-1">
                                        {DENSITY_REF.map(r=><button key={r.name} onClick={()=>{SFX.play('click');setQuizA(r.name);setQuizResult(null)}} className={`px-2 py-0.5 rounded border text-[10px] font-medium ${quizA===r.name?'bg-amber-200 border-amber-400':'bg-white border-gray-200 hover:bg-amber-50'}`}>{r.name}</button>)}
                                    </div>
                                </div>
                                <div>
                                    <p className="text-[10px] text-amber-700 mb-1">미지의 물질 B (밀도: {getUserDensity('mystery_b')} g/cm³)의 정체는?</p>
                                    <div className="flex flex-wrap gap-1">
                                        {DENSITY_REF.map(r=><button key={r.name} onClick={()=>{SFX.play('click');setQuizB(r.name);setQuizResult(null)}} className={`px-2 py-0.5 rounded border text-[10px] font-medium ${quizB===r.name?'bg-emerald-200 border-emerald-400':'bg-white border-gray-200 hover:bg-emerald-50'}`}>{r.name}</button>)}
                                    </div>
                                </div>
                                <button onClick={handleQuizSubmit} disabled={!quizA||!quizB} className="w-full bg-amber-600 text-white py-1.5 rounded text-xs font-bold hover:bg-amber-700 disabled:opacity-40">정답 확인</button>
                                {quizResult==='correct'&&<div className="bg-green-100 text-green-700 p-2 rounded text-xs font-bold text-center">🎉 정답! 미지의 물질 A는 금, B는 구리입니다! (미션 1 달성!)</div>}
                                {quizResult==='wrong'&&<div className="bg-red-100 text-red-600 p-2 rounded text-xs font-bold text-center">❌ 틀렸습니다. 참고표의 밀도와 비교해보세요!</div>}
                            </div>
                        </div>
                    )}
                </div>

                {/* Reference */}
                <div className="bg-gray-50 rounded-xl p-2.5 border border-gray-200 text-[11px] shadow">
                    <h4 className="font-bold text-gray-700 mb-1.5 flex items-center gap-1 border-b border-gray-200 pb-1"><InfoIcon size={11}/> 참고: 금속의 밀도 (20°C)</h4>
                    <table className="w-full text-left border-collapse">
                        <thead><tr className="text-gray-500"><th className="py-0.5 font-normal">물질</th><th className="py-0.5 font-normal text-right">밀도(g/cm³)</th></tr></thead>
                        <tbody className="text-gray-800">
                            {DENSITY_REF.map(r=><tr key={r.name} className="border-t border-gray-200"><td className="py-0.5">{r.name}</td><td className="text-right font-mono">{r.d.toFixed(2)}</td></tr>)}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    );
};

/* ===== TAB 2: TOWER ===== */
const DensityTower=({onAchieve})=>{
    const[layers,setLayers]=useState([]);
    const[userSequence,setUserSequence]=useState([null,null,null]);
    const[isSuccess,setIsSuccess]=useState(false);
    const[message,setMessage]=useState("");
    const[isMixing,setIsMixing]=useState(false);

    const availableLiquids=LIQUIDS;

    const addToTower=(l)=>{
        if(layers.length>=5||isMixing)return;
        SFX.play('splash');
        const n=[...layers,l];setLayers(n);setIsMixing(true);
        setTimeout(()=>{setLayers([...n].sort((a,b)=>b.density-a.density));setIsMixing(false)},2000);
    };

    const addToSequence=(l)=>{
        if(isSuccess)return;SFX.play('click');
        const i=userSequence.indexOf(null);
        if(i!==-1){const s=[...userSequence];s[i]=l;setUserSequence(s);check(s)}
    };

    const removeFromSequence=i=>{
        if(isSuccess)return;SFX.play('click');
        const n=[...userSequence];n[i]=null;setUserSequence(n);setIsSuccess(false);setMessage("");
    };

    const check=s=>{
        if(s.includes(null))return;
        let ok=true;for(let i=0;i<s.length-1;i++)if(s[i].density<s[i+1].density)ok=false;
        if(ok){setIsSuccess(true);setMessage("정답입니다! 각 액체의 밀도 값을 확인해보세요.");SFX.play('achievement');onAchieve('tower')}
        else{setMessage("순서가 틀렸습니다. 다시 실험해 보세요!");SFX.play('error')}
    };

    const resetAll=()=>{SFX.play('reset');setLayers([]);setUserSequence([null,null,null]);setIsSuccess(false);setMessage("");setIsMixing(false)};

    return(
        <div className="flex flex-col h-full p-4 items-center bg-gray-50 overflow-y-auto">
            <div className="w-full max-w-4xl mb-4 text-center">
                <h2 className="text-xl font-bold text-gray-800 flex items-center justify-center gap-2 mb-1"><Droplets className="text-purple-600"/> 물질이 뜨거나 가라앉는 것과 밀도의 관계</h2>
                <p className="text-gray-600 text-sm">서로 섞이지 않는 액체를 넣어보고 밀도에 따라 층이 분리되는 것을 관찰해보세요.</p>
            </div>
            <div className="w-full max-w-5xl flex flex-col md:flex-row items-start justify-center gap-8">
                <div className="flex flex-col items-center">
                    <div className={`w-32 h-64 border-4 border-gray-300 rounded-b-2xl bg-white relative overflow-hidden shadow-xl mb-2 ${isMixing?'mixing':''}`}>
                        <div className="absolute bottom-0 w-full flex flex-col-reverse transition-all">
                            {layers.map((l,idx)=>(
                                <div key={idx} className="w-full flex items-center justify-center liquid-layer" style={{height:'40px',backgroundColor:l.color,color:l.textColor,opacity:.9}}>
                                    <span className="text-xs font-bold drop-shadow-md">{l.name}</span>
                                </div>
                            ))}
                        </div>
                        {isMixing&&<div className="absolute inset-0 flex items-center justify-center bg-white bg-opacity-30 text-gray-800 font-bold animate-pulse text-sm">섞이는 중...</div>}
                    </div>
                    <span className="text-sm font-bold text-gray-500">실험용 컵</span>
                </div>
                <div className="flex-1 flex flex-col gap-5 w-full">
                    <div className="bg-white p-4 rounded-xl shadow-md">
                        <h3 className="font-bold text-gray-700 mb-2 text-sm">1단계: 액체 관찰하기 (클릭하여 컵에 넣기)</h3>
                        <p className="text-xs text-gray-500 mb-3">꿀, 물, 식용유는 서로 섞이지 않는 액체입니다.</p>
                        <div className="flex flex-wrap gap-2">
                            {availableLiquids.map(l=><button key={l.id} onClick={()=>addToTower(l)} disabled={isMixing} className="px-3 py-2 rounded-lg border hover:bg-gray-50 text-sm disabled:opacity-50" style={{borderLeft:`4px solid ${l.color}`}}>{l.name}</button>)}
                            <button onClick={resetAll} className="ml-auto text-xs text-red-500 underline">비우기</button>
                        </div>
                    </div>
                    <div className="bg-blue-50 p-5 rounded-xl border border-blue-200 shadow-md">
                        <h3 className="font-bold text-blue-900 mb-4 text-center text-sm">2단계: 밀도 순서 맞추기 (밀도가 큰 순서대로)</h3>
                        <div className="flex flex-wrap items-center justify-center gap-2 mb-5">
                            {userSequence.map((slot,idx)=>(
                                <React.Fragment key={idx}>
                                    <div onClick={()=>removeFromSequence(idx)} className={`w-24 h-28 rounded-lg border-2 border-dashed flex flex-col items-center justify-center cursor-pointer bg-white relative ${slot?'border-solid border-gray-400':'border-gray-300'}`}>
                                        {slot?(<>
                                            <div className="w-full h-full absolute inset-0 rounded-lg opacity-20" style={{backgroundColor:slot.color}}></div>
                                            <span className="font-bold text-gray-800 z-10 text-xs text-center">{slot.name}</span>
                                            {isSuccess&&<div className="absolute bottom-1.5 bg-blue-600 px-2 py-0.5 rounded-full text-[11px] font-bold text-white shadow z-10 density-highlight">{slot.density} g/mL</div>}
                                        </>):<span className="text-gray-300 text-2xl font-bold">{idx+1}</span>}
                                    </div>
                                    {idx<2&&<span className="text-gray-400 font-bold text-xl">&gt;</span>}
                                </React.Fragment>
                            ))}
                        </div>
                        <div className="flex flex-wrap justify-center gap-2 mb-4">
                            {availableLiquids.map(l=><button key={l.id} onClick={()=>addToSequence(l)} disabled={userSequence.some(s=>s&&s.id===l.id)||isSuccess} className="px-3 py-2 rounded border text-sm font-medium bg-white hover:bg-blue-50 disabled:opacity-30">{l.name}</button>)}
                        </div>
                        {message&&<div className={`text-center font-bold p-3 rounded-lg ${isSuccess?'bg-green-100 text-green-700':'bg-red-100 text-red-600'}`}>{message}{isSuccess&&' (미션 2 달성!)'}</div>}
                        <button onClick={resetAll} className="mt-3 w-full py-2 bg-gray-700 text-white rounded text-sm">초기화</button>
                    </div>
                </div>
            </div>
        </div>
    );
};

/* ===== TAB 3: DIVER ===== */
const DiverGame=({onAchieve})=>{
    const[weights,setWeights]=useState(0);
    const[status,setStatus]=useState('idle');
    const[depth,setDepth]=useState(8);
    const[isDiving,setIsDiving]=useState(false);
    const[showResult,setShowResult]=useState(false);

    const dive=()=>{
        SFX.play('dive');
        setIsDiving(true);setShowResult(false);
        let nd,ns;
        if(weights===0){nd=10;ns='surface_float'}
        else if(weights===1){nd=25;ns='shallow'}
        else if(weights===2){nd=45;ns='neutral'}
        else if(weights===3){nd=62;ns='deep'}
        else if(weights===4){nd=75;ns='very_deep'}
        else{nd=90;ns='floor'}
        setDepth(nd);setStatus(ns);
        setTimeout(()=>{
            setShowResult(true);
            if(ns==='neutral'){SFX.play('achievement');onAchieve('diver')}
        },2200);
    };

    const getStatusInfo=()=>{
        switch(status){
            case'surface_float':return{text:"밀도가 작아 물 위에 떠 있습니다. 납이 더 필요해요!",color:"text-sky-700",bg:"bg-sky-50 border-sky-200",emoji:"🏊"};
            case'shallow':return{text:"가라앉기 시작했지만 아직 수심이 얕습니다.",color:"text-blue-700",bg:"bg-blue-50 border-blue-200",emoji:"⬇️"};
            case'neutral':return{text:"🎉 성공! 수심 15m 지점에 안정적으로 멈췄습니다!",color:"text-green-700",bg:"bg-green-50 border-green-200",emoji:"✅"};
            case'deep':return{text:"너무 무거워서 15m보다 깊이 가라앉고 있습니다.",color:"text-orange-700",bg:"bg-orange-50 border-orange-200",emoji:"⚠️"};
            case'very_deep':return{text:"밀도가 너무 커서 깊은 곳으로 계속 가라앉습니다!",color:"text-red-600",bg:"bg-red-50 border-red-200",emoji:"🚨"};
            case'floor':return{text:"바닥에 닿았습니다! 납이 너무 많아요!",color:"text-red-700",bg:"bg-red-50 border-red-200",emoji:"💥"};
            default:return{text:"납 벨트 수를 조절하고 잠수를 시작해보세요!",color:"text-gray-600",bg:"bg-gray-50 border-gray-200",emoji:"🤿"};
        }
    };
    const si=getStatusInfo();

    return(
        <div className="flex flex-col h-full p-3 gap-3 bg-slate-100">
            <div className="flex flex-col md:flex-row gap-3 h-full">
                {/* Ocean */}
                <div className="flex-1 rounded-2xl overflow-hidden relative shadow-2xl ocean-gradient border-4 border-slate-300" style={{minHeight:'420px'}}>
                    <div className="absolute top-0 left-0 w-full h-[15%]" style={{background:'linear-gradient(to bottom,#e0f2fe,#bae6fd)'}}></div>
                    <div className="absolute top-2 right-16 w-10 h-10 bg-yellow-300 rounded-full" style={{boxShadow:'0 0 20px 8px rgba(253,224,71,.4)'}}></div>
                    <div className="absolute top-2 left-20"><svg width="60" height="24"><ellipse cx="20" cy="14" rx="16" ry="8" fill="white" opacity=".8"/><ellipse cx="35" cy="12" rx="20" ry="10" fill="white" opacity=".8"/><ellipse cx="50" cy="14" rx="14" ry="7" fill="white" opacity=".8"/></svg></div>
                    <div className="absolute left-6 top-[3%] z-10"><SimpleShip/></div>
                    <div className="absolute right-[20%] top-[6%] z-10"><LifeJacketPerson/><div className="text-[9px] font-bold text-white bg-orange-500 px-1.5 py-0.5 rounded-full text-center -mt-1 shadow">구명조끼</div></div>
                    <OceanWaves/>
                    <div className="absolute right-0 h-full w-10 bg-black bg-opacity-20 flex flex-col justify-between text-white text-[9px] font-mono text-center z-10" style={{paddingTop:'16%',paddingBottom:'4%'}}><span>0m</span><span>5m</span><span>10m</span><span className="text-yellow-300 font-bold bg-yellow-900 bg-opacity-40 rounded px-0.5">15m</span><span>20m</span><span>25m</span><span>30m</span></div>
                    <div className="absolute left-0 right-10 border-t-2 border-dashed border-yellow-400 opacity-40 z-5" style={{top:'45%'}}></div>
                    <Bubbles count={8}/>
                    <Fish className="fish-anim" color="#f59e0b" y="55%"/>
                    <Fish className="fish-anim-2" color="#fb7185" y="75%"/>
                    <Seaweed x="10%" h={45}/><Seaweed x="25%" h={35}/><Seaweed x="70%" h={40}/><Seaweed x="85%" h={30}/>
                    <div className="absolute bottom-0 left-0 w-full h-5" style={{background:'linear-gradient(to bottom,#d4a574,#c2956a)'}}></div>
                    <div className="absolute left-1/2 transform -translate-x-1/2 diver-anim z-20" style={{top:`${depth}%`,marginTop:'-40px'}}><div className="gentle-bob"><RealisticDiver weightCount={weights}/></div></div>
                </div>

                {/* Controls */}
                <div className="md:w-72 bg-white p-4 rounded-2xl shadow-lg flex flex-col justify-between border border-slate-200">
                    <div>
                        <h2 className="text-lg font-bold text-slate-800 mb-1 flex items-center gap-2"><Waves className="text-blue-600" size={20}/> 잠수부와 밀도</h2>
                        <p className="text-slate-500 text-[11px] mb-3"><strong className="text-slate-700">미션:</strong> 납 벨트 수를 조절하여 <span className="text-blue-600 font-bold">수심 15m</span>에 멈추세요!</p>
                        <div className="bg-slate-50 p-3 rounded-xl mb-3 border border-slate-200">
                            <h3 className="font-bold text-center mb-2 text-slate-700 text-xs">납 벨트 수 조절</h3>
                            <div className="flex items-center justify-between px-1">
                                <button onClick={()=>{SFX.play('click');setWeights(Math.max(0,weights-1));setIsDiving(false);setShowResult(false)}} className="w-10 h-10 bg-white border-2 border-red-200 text-red-500 rounded-xl font-bold text-lg shadow-sm hover:bg-red-50 active:scale-95">−</button>
                                <div className="text-center"><span className="text-4xl font-bold text-slate-800">{weights}</span><div className="text-[9px] text-slate-400 font-bold tracking-widest mt-0.5">개</div></div>
                                <button onClick={()=>{SFX.play('click');setWeights(Math.min(5,weights+1));setIsDiving(false);setShowResult(false)}} className="w-10 h-10 bg-white border-2 border-green-200 text-green-500 rounded-xl font-bold text-lg shadow-sm hover:bg-green-50 active:scale-95">+</button>
                            </div>
                            <div className="flex justify-center gap-1 mt-2">{[...Array(5)].map((_,i)=><div key={i} className={`w-5 h-3 rounded border ${i<weights?'bg-slate-700 border-slate-800':'bg-gray-100 border-gray-200'} transition-colors`}></div>)}</div>
                        </div>
                        <div className={`p-2.5 rounded-xl border text-xs mb-3 transition-all ${si.bg}`}>
                            <p className={`font-medium ${si.color} text-center`}>{si.emoji} {si.text}</p>
                            {status==='neutral'&&showResult&&<p className="text-center text-green-600 font-bold text-xs mt-1">미션 3 달성!</p>}
                        </div>
                    </div>
                    <div>
                        <button onClick={dive} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2"><CircleDashed size={18} className={isDiving?"animate-spin":""}/> 잠수 시작!</button>
                        <div className="mt-2 p-2.5 bg-slate-50 rounded-xl text-[10px] text-slate-600 border border-slate-200 leading-relaxed">
                            <p className="mb-1"><strong className="text-slate-800">🏊 잠수부</strong>는 납 허리띠로 전체 밀도를 높여 가라앉습니다.</p>
                            <p><strong className="text-slate-800">🦺 구명조끼</strong>는 부피를 늘려 평균 밀도를 낮추어 뜨게 합니다.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
};

/* ===== APP ===== */
const App=()=>{
    const[activeTab,setActiveTab]=useState('experiment');
    const[achievements,setAchievements]=useState({explore:false,tower:false,diver:false});
    const[showCert,setShowCert]=useState(false);
    const[showInfo,setShowInfo]=useState(false);
    const[justAchieved,setJustAchieved]=useState(null);
    const[showConfetti,setShowConfetti]=useState(false);

    const handleAchieve=useCallback((key)=>{
        setAchievements(prev=>{
            if(prev[key])return prev;
            const next={...prev,[key]:true};
            setJustAchieved(key);
            setTimeout(()=>setJustAchieved(null),3000);
            const total=Object.values(next).filter(Boolean).length;
            if(total===3){
                setTimeout(()=>{setShowCert(true);setShowConfetti(true);setTimeout(()=>setShowConfetti(false),4000)},500);
            }
            return next;
        });
    },[]);

    const achieveLabels={explore:'🔬 탐구 미션 달성!',tower:'🧪 밀도탑 미션 달성!',diver:'🤿 잠수 미션 달성!'};

    return(
        <div className="min-h-screen flex flex-col max-w-6xl mx-auto shadow-2xl my-0 lg:my-8 bg-white lg:rounded-3xl overflow-hidden relative">
            {showConfetti&&<Confetti/>}
            {showCert&&<CertificateModal onClose={()=>setShowCert(false)}/>}
            {showInfo&&<InfoModal onClose={()=>setShowInfo(false)}/>}

            {/* Achievement toast */}
            {justAchieved&&(
                <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 achievement-pop">
                    <div className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-2xl shadow-2xl font-bold flex items-center gap-2 text-sm">
                        <Trophy size={20}/>{achieveLabels[justAchieved]}
                    </div>
                </div>
            )}

            <header className="bg-slate-800 text-white p-3 flex flex-col md:flex-row justify-between items-center z-20 gap-3">
                <div className="flex items-center gap-2">
                    <div className="bg-blue-500 p-1.5 rounded-lg"><Beaker className="text-white" size={20}/></div>
                    <h1 className="text-base font-bold tracking-tight">가상 과학 실험실 : I. 물질의 특성 - 1. 밀도</h1>
                    <button onClick={()=>{SFX.play('click');setShowInfo(true)}} className="ml-1 bg-slate-600 hover:bg-slate-500 p-1 rounded-full transition-colors" title="앱 정보">
                        <InfoIcon size={16} className="text-slate-300"/>
                    </button>
                </div>
                <div className="flex items-center gap-3">
                    <AchievementBar achievements={achievements} onShowCert={()=>{SFX.play('click');setShowCert(true);setShowConfetti(true);setTimeout(()=>setShowConfetti(false),4000)}}/>
                    <div className="flex bg-slate-700 rounded-lg p-0.5 gap-0.5">
                        {[{key:'experiment',label:'1. 탐구',color:'blue'},{key:'tower',label:'2. 해 보기',color:'purple'},{key:'diver',label:'3. 생활 속 밀도',color:'teal'}].map(t=>(
                            <button key={t.key} onClick={()=>{SFX.play('click');setActiveTab(t.key)}} className={`px-3 py-1.5 rounded-md text-xs font-bold transition-all ${activeTab===t.key?`bg-${t.color}-500 text-white shadow`:'text-gray-300 hover:text-white'}`}>{t.label}</button>
                        ))}
                    </div>
                </div>
            </header>
            <main className="flex-1 bg-gray-50 overflow-y-auto" style={{minHeight:'550px'}}>
                {activeTab==='experiment'&&<ExperimentLab onAchieve={handleAchieve}/>}
                {activeTab==='tower'&&<DensityTower onAchieve={handleAchieve}/>}
                {activeTab==='diver'&&<DiverGame onAchieve={handleAchieve}/>}
            </main>
            <footer className="bg-slate-800 text-white p-2.5 text-center text-xs">
                <div className="font-medium">© 2026 과학이조선생(조승재) & 송쌤과학. All rights reserved.</div>
                <div className="text-slate-400 mt-0.5">Last updated : 2026-03-09</div>
            </footer>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
