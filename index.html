<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가상 과학 실험실 : I. 물질의 특성 - 1. 밀도</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f4f8; margin:0; }
        .cylinder-gradient {
            background: linear-gradient(90deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.4) 100%);
            border-left: 1px solid rgba(255,255,255,0.5);
            border-right: 1px solid rgba(255,255,255,0.5);
        }
        .water-surface { transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .liquid-layer { transition: all 0.8s ease-in-out; }
        .ocean-gradient {
            background: linear-gradient(to bottom, #bae6fd 0%, #7dd3fc 10%, #38bdf8 20%, #0284c7 50%, #075985 75%, #0c4a6e 100%);
        }
        .diver-anim { transition: top 2s cubic-bezier(0.45, 0.05, 0.55, 0.95); }

        .ship-float { animation: ship-move 4s ease-in-out infinite; }
        @keyframes ship-move {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-4px) rotate(1.5deg); }
        }

        @keyframes bubble-rise {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.7; }
            50% { transform: translateY(-80px) translateX(-8px) scale(1.2); opacity: 0.5; }
            100% { transform: translateY(-160px) translateX(4px) scale(0.6); opacity: 0; }
        }
        .bubble { animation: bubble-rise var(--dur, 3s) var(--delay, 0s) infinite ease-out; }

        @keyframes wave-move {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .wave-anim { animation: wave-move 6s linear infinite; }

        @keyframes fish-swim {
            0% { transform: translateX(-40px) scaleX(1); }
            49% { transform: translateX(200px) scaleX(1); }
            50% { transform: translateX(200px) scaleX(-1); }
            99% { transform: translateX(-40px) scaleX(-1); }
            100% { transform: translateX(-40px) scaleX(1); }
        }
        .fish-anim { animation: fish-swim 8s linear infinite; }
        .fish-anim-2 { animation: fish-swim 11s 2s linear infinite; }

        @keyframes seaweed-sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        .seaweed { animation: seaweed-sway 3s ease-in-out infinite; transform-origin: bottom center; }

        @keyframes mix-shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-2px, -2px); }
            20% { transform: translate(2px, 2px); }
            30% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            50% { transform: translate(-1px, 1px); }
            60% { transform: translate(1px, -1px); }
            70% { transform: translate(0, 2px); }
            80% { transform: translate(-2px, 0); }
            90% { transform: translate(1px, 1px); }
            100% { transform: translate(0, 0); }
        }
        .mixing .liquid-layer {
            animation: mix-shake 0.5s infinite;
            filter: blur(1px);
            opacity: 0.8;
        }

        @keyframes float-person {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-6px) rotate(2deg); }
        }
        .float-person { animation: float-person 3s ease-in-out infinite; }

        @keyframes gentle-bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }
        .gentle-bob { animation: gentle-bob 2s ease-in-out infinite; }

        .scale-plate {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Guide panel animation */
        @keyframes fade-slide-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .guide-step { animation: fade-slide-in 0.3s ease-out forwards; }

        /* Density result highlight */
        @keyframes highlight-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.3); }
            50% { box-shadow: 0 0 0 8px rgba(59,130,246,0); }
        }
        .density-highlight { animation: highlight-pulse 2s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- Icon Components ---
        const Icon = ({ size = 24, color = "currentColor", children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const Beaker = (props) => ( <Icon {...props}><path d="M4.5 3h15" /><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3" /><path d="M6 14h12" /></Icon> );
        const FlaskConical = (props) => ( <Icon {...props}><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2" /><path d="M8.5 2h7" /><path d="M7 16h10" /></Icon> );
        const Info = (props) => ( <Icon {...props}><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></Icon> );
        const RefreshCcw = (props) => ( <Icon {...props}><path d="M3 2v6h6" /><path d="M21 12A9 9 0 0 0 6 5.3L3 8" /><path d="M21 22v-6h-6" /><path d="M3 12a9 9 0 0 0 15 6.7l3-2.7" /></Icon> );
        const Droplets = (props) => ( <Icon {...props}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.8-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z" /><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.35" /></Icon> );
        const Waves = (props) => ( <Icon {...props}><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1" /><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1" /><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1" /></Icon> );
        const Thermometer = (props) => ( <Icon {...props}><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" /></Icon> );
        const CircleDashed = (props) => ( <Icon {...props}><path d="M10.1 2.182a10 10 0 0 1 3.8 0" /><path d="M17.609 3.721a10 10 0 0 1 2.69 2.7" /><path d="M21.818 10.1a10 10 0 0 1 0 3.8" /><path d="M20.279 17.609a10 10 0 0 1-2.7 2.69" /><path d="M13.9 21.818a10 10 0 0 1-3.8 0" /><path d="M6.391 20.279a10 10 0 0 1-2.69-2.7" /><path d="M2.182 13.9a10 10 0 0 1 0-3.8" /><path d="M3.721 6.391a10 10 0 0 1 2.7-2.69" /></Icon> );
        const CheckCircle = (props) => ( <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></Icon> );
        const ArrowRight = (props) => ( <Icon {...props}><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></Icon> );

        // --- Data ---
        const MATERIALS = [
            { id: 'iron_s', name: '철 조각 (소)', color: '#64748b', mass: 39.35, volume: 5, density: 7.87, size: 'small', group: 'iron' },
            { id: 'iron_l', name: '철 조각 (대)', color: '#475569', mass: 78.7, volume: 10, density: 7.87, size: 'large', group: 'iron' },
            { id: 'alu_s', name: '알루미늄 (소)', color: '#cbd5e1', mass: 13.5, volume: 5, density: 2.70, size: 'small', group: 'alu' },
            { id: 'alu_l', name: '알루미늄 (대)', color: '#94a3b8', mass: 27.0, volume: 10, density: 2.70, size: 'large', group: 'alu' },
            { id: 'mystery_a', name: '미지의 물질 A', color: '#fbbf24', mass: 96.6, volume: 5, density: 19.32, size: 'small', group: 'mystery' },
            { id: 'mystery_b', name: '미지의 물질 B', color: '#10b981', mass: 89.6, volume: 10, density: 8.96, size: 'large', group: 'mystery' },
        ];

        const LIQUIDS = [
            { id: 'honey', name: '꿀', density: 1.42, color: '#d97706', textColor: 'white' },
            { id: 'soap', name: '주방세제', density: 1.06, color: '#ec4899', textColor: 'white' },
            { id: 'water', name: '물', density: 1.00, color: '#3b82f6', textColor: 'white' },
            { id: 'oil', name: '식용유', density: 0.92, color: '#eab308', textColor: 'black' },
            { id: 'alcohol', name: '에탄올', density: 0.79, color: '#a855f7', textColor: 'white' },
        ];

        // --- Graphic Components ---
        const Bubbles = ({ count = 6 }) => (
            <>{[...Array(count)].map((_, i) => (
                <div key={i} className="bubble absolute rounded-full bg-white bg-opacity-30"
                    style={{
                        width: 4 + Math.random()*8,
                        height: 4 + Math.random()*8,
                        left: `${10 + Math.random()*80}%`,
                        bottom: `${Math.random()*30}%`,
                        '--dur': `${2.5 + Math.random()*3}s`,
                        '--delay': `${Math.random()*3}s`,
                    }} />
            ))}</>
        );

        const OceanWaves = () => (
            <div className="absolute top-[14%] left-0 w-full h-6 overflow-hidden z-10 pointer-events-none">
                <svg className="wave-anim" width="200%" height="24" viewBox="0 0 1200 24" preserveAspectRatio="none">
                    <path d="M0 12 Q30 4 60 12 T120 12 T180 12 T240 12 T300 12 T360 12 T420 12 T480 12 T540 12 T600 12 T660 12 T720 12 T780 12 T840 12 T900 12 T960 12 T1020 12 T1080 12 T1140 12 T1200 12 V24 H0Z" fill="#7dd3fc" opacity="0.5"/>
                </svg>
            </div>
        );

        const Fish = ({ className, color = "#f59e0b", y = "60%" }) => (
            <div className={`absolute ${className}`} style={{ top: y, left: 0 }}>
                <svg width="28" height="16" viewBox="0 0 28 16">
                    <ellipse cx="12" cy="8" rx="10" ry="6" fill={color} opacity="0.7"/>
                    <polygon points="22,8 28,3 28,13" fill={color} opacity="0.7"/>
                    <circle cx="7" cy="7" r="1.5" fill="white"/><circle cx="7" cy="7" r="0.8" fill="black"/>
                </svg>
            </div>
        );

        const Seaweed = ({ x, h = 40 }) => (
            <div className="seaweed absolute bottom-0" style={{ left: x }}>
                <svg width="16" height={h} viewBox={`0 0 16 ${h}`}>
                    <path d={`M8 ${h} Q2 ${h*0.7} 10 ${h*0.5} Q4 ${h*0.3} 8 0`} fill="none" stroke="#16a34a" strokeWidth="3" opacity="0.6"/>
                </svg>
            </div>
        );

        const RealisticDiver = ({ weightCount }) => (
            <svg width="80" height="100" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <rect x="35" y="30" width="20" height="45" rx="10" fill="#fbbf24" stroke="#d97706" strokeWidth="1" />
                <path d="M40 25 Q50 20 60 25 L65 70 Q50 80 35 70 Z" fill="#1e293b" />
                <circle cx="50" cy="20" r="12" fill="#334155" />
                <rect x="42" y="15" width="16" height="8" rx="2" fill="#94a3b8" />
                <path d="M40 30 L25 50" stroke="#1e293b" strokeWidth="8" strokeLinecap="round" />
                <path d="M60 30 L75 50" stroke="#1e293b" strokeWidth="8" strokeLinecap="round" />
                <path d="M42 70 L35 95" stroke="#1e293b" strokeWidth="8" strokeLinecap="round" />
                <path d="M58 70 L65 95" stroke="#1e293b" strokeWidth="8" strokeLinecap="round" />
                <rect x="38" y="65" width="24" height="6" fill="#475569" rx="1" />
                {[...Array(weightCount)].map((_, i) => (
                    <rect key={i} x={40 + i*4} y={66} width="3" height="4" fill="#fef08a" rx="0.5" stroke="#854d0e" strokeWidth="0.3"/>
                ))}
            </svg>
        );

        const SimpleShip = () => (
            <div className="ship-float">
                <svg width="100" height="50" viewBox="0 0 120 60">
                    <path d="M10 40 L110 40 L100 58 L20 58 Z" fill="#e2e8f0" stroke="#94a3b8" strokeWidth="1.5" />
                    <rect x="40" y="18" width="40" height="22" rx="2" fill="white" stroke="#94a3b8" strokeWidth="1.5" />
                    <rect x="48" y="22" width="8" height="8" rx="1" fill="#bfdbfe" />
                    <rect x="62" y="22" width="8" height="8" rx="1" fill="#bfdbfe" />
                    <rect x="55" y="5" width="6" height="15" fill="#64748b" />
                    <rect x="52" y="4" width="12" height="4" rx="1" fill="#ef4444" />
                </svg>
            </div>
        );

        const LifeJacketPerson = () => (
            <div className="float-person">
                <svg width="50" height="65" viewBox="0 0 60 80">
                    <circle cx="30" cy="18" r="9" fill="#fecaca" />
                    <path d="M24 15 Q30 12 36 15" stroke="#7c2d12" strokeWidth="1.5" fill="none"/>
                    <circle cx="27" cy="17" r="1" fill="#44403c"/><circle cx="33" cy="17" r="1" fill="#44403c"/>
                    <rect x="16" y="28" width="28" height="22" rx="6" fill="#f97316" />
                    <rect x="20" y="30" width="20" height="18" rx="3" fill="#fb923c" />
                    <path d="M16 38 L8 45" stroke="#fecaca" strokeWidth="4" strokeLinecap="round"/>
                    <path d="M44 38 L52 45" stroke="#fecaca" strokeWidth="4" strokeLinecap="round"/>
                </svg>
            </div>
        );

        // --- Tab 1: Explore ---
        const ExperimentLab = () => {
            const [selectedObj, setSelectedObj] = useState(null);
            const [scaleValue, setScaleValue] = useState(0);
            const [onScale, setOnScale] = useState(null);
            const [baseWaterVolume] = useState(50.0);
            const [inCylinder, setInCylinder] = useState(null);
            const [temperature, setTemperature] = useState(20);
            const [measurements, setMeasurements] = useState({});
            const [guideStep, setGuideStep] = useState(0);
            const [showConclusion, setShowConclusion] = useState(false);

            const currentWaterVolume = baseWaterVolume + (baseWaterVolume * 0.0004 * (temperature - 20));
            const totalVolume = currentWaterVolume + (inCylinder ? inCylinder.volume : 0);

            // Check if all materials measured
            const allMeasured = MATERIALS.every(m => measurements[m.id]?.mass && measurements[m.id]?.volume);
            const canShowConclusion = Object.keys(measurements).length >= 4;

            const handleSelect = (obj) => {
                if (inCylinder || onScale) return;
                setSelectedObj(obj);
                if (guideStep === 0) setGuideStep(1);
            };

            const placeOnScale = () => {
                if (!selectedObj) return;
                setOnScale(selectedObj);
                const m = selectedObj;
                setSelectedObj(null);
                setTimeout(() => {
                    setScaleValue(m.mass.toFixed(2));
                    setMeasurements(prev => ({
                        ...prev,
                        [m.id]: { ...prev[m.id], mass: m.mass, name: m.name, group: m.group, density: m.density }
                    }));
                    if (guideStep < 2) setGuideStep(2);
                }, 400);
            };

            const placeInCylinder = () => {
                if (!selectedObj) return;
                const m = selectedObj;
                setInCylinder(m);
                setSelectedObj(null);
                setMeasurements(prev => ({
                    ...prev,
                    [m.id]: { ...prev[m.id], volume: m.volume, name: m.name, group: m.group, density: m.density }
                }));
                if (guideStep < 3) setGuideStep(3);
            };

            const resetExperiment = () => {
                setOnScale(null);
                setInCylinder(null);
                setSelectedObj(null);
                setScaleValue(0);
            };

            const resetAll = () => {
                resetExperiment();
                setMeasurements({});
                setGuideStep(0);
                setShowConclusion(false);
            };

            const getGuideMessage = () => {
                if (guideStep === 0) return { title: "시작하기", text: "아래 '실험 재료'에서 측정할 물질을 클릭하세요.", icon: "👆" };
                if (guideStep === 1) return { title: "측정 도구 선택", text: "저울에 '올리기'로 질량을, 눈금 실린더에 '넣기'로 부피를 측정하세요.", icon: "⚖️" };
                if (guideStep === 2) return { title: "질량 측정 완료!", text: "저울에서 질량을 확인했습니다. '실험 도구 비우기'를 누른 뒤, 같은 물질의 부피도 측정해보세요.", icon: "✅" };
                if (guideStep === 3) return { title: "부피 측정 완료!", text: "눈금 실린더에서 부피 변화를 확인하세요. (늘어난 부피 = 물질의 부피) '실험 도구 비우기' 후 다른 물질도 측정해보세요.", icon: "✅" };
                return { title: "", text: "", icon: "" };
            };
            const guide = getGuideMessage();

            const getDensityForMeasured = (id) => {
                const m = measurements[id];
                if (m?.mass && m?.volume) return (m.mass / m.volume).toFixed(2);
                return null;
            };

            return (
                <div className="flex flex-col lg:flex-row h-full gap-4 p-4">
                    {/* Left: Lab area */}
                    <div className="flex-1 bg-white rounded-2xl shadow-lg p-6 flex flex-col relative overflow-hidden">
                        <div className="flex flex-wrap justify-between items-center mb-6 gap-2">
                            <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                <FlaskConical className="text-blue-600" />
                                탐구: 질량과 부피를 측정하여 밀도 구하기
                            </h2>
                            <div className="bg-orange-50 p-2 rounded-lg border border-orange-200 flex items-center gap-3">
                                <Thermometer className="text-orange-500" size={18} />
                                <div className="flex flex-col">
                                    <span className="text-xs text-orange-800 font-bold">물의 온도: {temperature}°C</span>
                                    <input type="range" min="0" max="80" value={temperature} onChange={(e) => setTemperature(parseInt(e.target.value))} className="w-28 h-2 bg-orange-200 rounded-lg appearance-none cursor-pointer" />
                                </div>
                            </div>
                        </div>

                        {/* Guide Banner */}
                        <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 mb-4 guide-step" key={guideStep}>
                            <div className="flex items-start gap-3">
                                <span className="text-2xl">{guide.icon}</span>
                                <div>
                                    <h4 className="font-bold text-blue-800 text-sm">{guide.title}</h4>
                                    <p className="text-blue-700 text-xs leading-relaxed">{guide.text}</p>
                                </div>
                            </div>
                        </div>

                        {/* Lab instruments */}
                        <div className="flex-1 flex flex-row justify-around items-end gap-8 pb-4">
                            {/* Scale */}
                            <div className="flex flex-col items-center relative z-10 w-48">
                                <div className="w-full h-8 bg-gray-400 rounded-lg shadow-md mt-auto"></div>
                                <div className={`w-40 h-4 bg-gray-300 rounded-t-lg mx-auto relative -mt-12 mb-2 scale-plate ${onScale ? 'translate-y-0.5' : ''}`}>
                                    {onScale && <div className="absolute bottom-full left-1/2 transform -translate-x-1/2 shadow-lg mb-0 border border-gray-500" style={{ backgroundColor: onScale.color, width: onScale.size === 'large' ? '48px' : '32px', height: onScale.size === 'large' ? '48px' : '32px', borderRadius: '4px' }}></div>}
                                </div>
                                <div className="bg-gray-800 text-green-400 font-mono text-2xl px-4 py-2 rounded-lg border-4 border-gray-300 shadow-inner w-full text-center mt-4">
                                    {scaleValue} <span className="text-sm">g</span>
                                </div>
                                <span className="text-gray-500 text-sm mt-2 font-medium">전자 저울</span>
                                {selectedObj && !onScale && !inCylinder && (
                                    <button onClick={placeOnScale} className="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-blue-500 text-white px-3 py-1.5 rounded-lg shadow-lg text-sm animate-pulse whitespace-nowrap font-medium">⬇ 올리기</button>
                                )}
                            </div>
                            {/* Cylinder */}
                            <div className="flex flex-col items-center relative w-32">
                                <div className="relative w-24 h-64 border-l-2 border-r-2 border-b-4 border-gray-400 rounded-b-xl bg-white bg-opacity-50 overflow-hidden cylinder-gradient">
                                    {[...Array(10)].map((_, i) => (
                                        <div key={i} className="absolute w-full border-t border-gray-300" style={{bottom: `${(i+1)*10}%`}}>
                                            <span className="absolute right-1 -top-3 text-[10px] text-gray-400">{(i+1)*10}</span>
                                        </div>
                                    ))}
                                    <div className="absolute bottom-0 w-full bg-blue-400 bg-opacity-60 water-surface" style={{ height: `${(totalVolume / 100) * 100}%` }}></div>
                                    {inCylinder && (
                                        <div className="absolute left-1/2 transform -translate-x-1/2 shadow-lg border border-gray-600" style={{ bottom: '10%', backgroundColor: inCylinder.color, width: inCylinder.size === 'large' ? '30px' : '20px', height: inCylinder.size === 'large' ? '30px' : '20px', borderRadius: '4px', transition: 'bottom 1s ease-out' }}></div>
                                    )}
                                </div>
                                <div className="mt-2 text-center">
                                    <div className="font-bold text-blue-800 text-lg">{totalVolume.toFixed(2)} mL</div>

                if (layers.length >= 5 || isMixing) return;
                const newUnsorted = [...layers, l];
                setLayers(newUnsorted);
                setIsMixing(true);
                setTimeout(() => {
                    const sorted = [...newUnsorted].sort((a,b) => b.density - a.density);
                    setLayers(sorted);
                    setIsMixing(false);
                }, 2000);
            };

            const addToSequence = (l) => {
                if(isSuccess) return;
                const i = userSequence.indexOf(null);
                if(i !== -1) {
                    const s = [...userSequence];
                    s[i] = l;
                    setUserSequence(s);
                    check(s);
                }
            };

            const removeFromSequence = (index) => {
                if (isSuccess) return;
                const newSeq = [...userSequence];
                newSeq[index] = null;
                setUserSequence(newSeq);
                setIsSuccess(false);
                setMessage("");
            };

            const check = (s) => {
                if(s.includes(null)) return;
                let ok = true;
                for(let i=0; i<s.length-1; i++) if(s[i].density < s[i+1].density) ok = false;
                if(ok) {
                    setIsSuccess(true);
                    setMessage("정답입니다! 각 액체의 밀도 값을 확인해보세요.");
                } else {
                    setMessage("순서가 틀렸습니다. 다시 실험해 보세요!");
                }

                setMessage("");
                setIsMixing(false);

                            </div>

                                </p>

                                {/* Weight control */}
                                <div className="bg-slate-50 p-4 rounded-xl mb-4 border border-slate-200">
                                    <h3 className="font-bold text-center mb-3 text-slate-700 text-sm">납 벨트 수 조절</h3>
                                    <div className="flex items-center justify-between px-2">
                                        <button onClick={() => {setWeights(Math.max(0, weights - 1)); setIsDiving(false); setShowResult(false);}}
                                            className="w-12 h-12 bg-white border-2 border-red-200 text-red-500 rounded-xl font-bold text-xl shadow-sm hover:bg-red-50 active:scale-95 transition-all">−</button>
                                        <div className="text-center">
                                            <span className="text-5xl font-bold text-slate-800">{weights}</span>
                                            <div className="text-[10px] text-slate-400 font-bold tracking-widest mt-1">개</div>
                                        </div>
                                        <button onClick={() => {setWeights(Math.min(5, weights + 1)); setIsDiving(false); setShowResult(false);}}
                                            className="w-12 h-12 bg-white border-2 border-green-200 text-green-500 rounded-xl font-bold text-xl shadow-sm hover:bg-green-50 active:scale-95 transition-all">+</button>
                                    </div>
                                    {/* Weight visualization */}
                                    <div className="flex justify-center gap-1 mt-3">
                                        {[...Array(5)].map((_, i) => (
                                            <div key={i} className={`w-6 h-4 rounded border ${i < weights ? 'bg-slate-700 border-slate-800' : 'bg-gray-100 border-gray-200'} transition-colors`}></div>
                                        ))}
                                    </div>
                                </div>

                                {/* Status message */}
                                <div className={`p-3 rounded-xl border text-sm mb-4 transition-all ${statusInfo.bg}`}>
                                    <p className={`font-medium ${statusInfo.color} text-center`}>{statusInfo.text}</p>
                                </div>
                            </div>

                            <div>
                                <button onClick={dive}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2 text-lg">
                                    <CircleDashed size={20} className={isDiving ? "animate-spin" : ""} />
                                    잠수 시작!
                                </button>

                                <div className="mt-3 p-3 bg-slate-50 rounded-xl text-xs text-slate-600 border border-slate-200 leading-relaxed">
                                    <p className="mb-1.5"><strong className="text-slate-800">🏊 잠수부</strong>는 물속에 가라앉기 위해 <strong>납이 달린 허리띠</strong>를 착용합니다. 납을 달면 전체 밀도가 물보다 커져서 가라앉을 수 있습니다.</p>
                                    <p><strong className="text-slate-800">🦺 구명조끼</strong>를 입으면 전체 부피가 커져 평균 밀도가 물보다 작아지므로 물에 뜹니다.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('experiment');
            return (
                <div className="min-h-screen flex flex-col max-w-6xl mx-auto shadow-2xl my-0 lg:my-8 bg-white lg:rounded-3xl overflow-hidden">
                    <header className="bg-slate-800 text-white p-4 flex flex-col md:flex-row justify-between items-center z-20 gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-500 p-2 rounded-lg"><Beaker className="text-white" size={24} /></div>
                            <h1 className="text-xl font-bold tracking-tight">가상 과학 실험실 : I. 물질의 특성 - 1. 밀도</h1>
                        </div>
                        <div className="flex flex-wrap justify-center bg-slate-700 rounded-lg p-1 gap-1">
                            <button onClick={() => setActiveTab('experiment')} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${activeTab === 'experiment' ? 'bg-blue-500 text-white shadow' : 'text-gray-300 hover:text-white'}`}>1. 탐구</button>
                            <button onClick={() => setActiveTab('tower')} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${activeTab === 'tower' ? 'bg-purple-500 text-white shadow' : 'text-gray-300 hover:text-white'}`}>2. 해 보기</button>
                            <button onClick={() => setActiveTab('diver')} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${activeTab === 'diver' ? 'bg-teal-500 text-white shadow' : 'text-gray-300 hover:text-white'}`}>3. 생활 속 밀도</button>
                        </div>
                    </header>
                    <main className="flex-1 bg-gray-50 overflow-y-auto" style={{minHeight: '600px'}}>
                        {activeTab === 'experiment' && <ExperimentLab />}
                        {activeTab === 'tower' && <DensityTower />}
                        {activeTab === 'diver' && <DiverGame />}
                    </main>
                    <footer className="bg-slate-800 text-white p-3 text-center text-xs">
                        <div className="font-medium">© 2026 과학이조선생(조승재) & 송쌤과학. All rights reserved.</div>
                        <div className="text-slate-400 mt-1">Last updated : 2026-03-09</div>
                    </footer>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
